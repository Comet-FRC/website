<head>
    <link rel="stylesheet" href="/css/mobile_nav_bar.css">
    <link rel="stylesheet" href="/css/navigation_bar.css">
</head>

<div id="nav_bar">
    <span id="logo">
        <a href="/"><img src="/images/comet_cat.svg"></a>
    </span>

    <div class="button-wrapper">
        <!--Landing, sponsors, robot info-->
        <a href="/" class="button">Home</a>
        <!--Mission, subteam info, leads (member filtering by team, default to leads)-->
        <div class="dropdown">
            <div href="about.html" class="dropdown-button">
                Learn More
                <span class="dropdown-icon"><i class="fa-solid fa-caret-down"></i></span>
            </div>
            <div class="dropdown-content">
                <a href="/about.html">About Us</a>
                <a href="/leads.html">Our Leads</a>
            </div>
        </div>
        <!-- <a href="/contact.html" class="button dropdown-content">Meet Our Leads</a> -->
        <!--Community - landing, events, updates, and media-->
        <a href="/community" class="button">Community</a>
        <a href="/contact.html" class="button">Contact</a>
    </div>
    <span id="bg"></span>
</div>

<script>
    window.addEventListener('scroll', function() {
        const nav_bar = document.querySelector("#nav_bar #bg");

        if (window.scrollY > 0) {
            nav_bar.style.backdropFilter = "blur(10px) brightness(20%)";
        } else {
            nav_bar.style.backdropFilter = null;
        }
    });
</script>
