<head>
    <link rel="stylesheet" href="/css/navigation_bar.css">
</head>

<div id="nav_bar">
    <span id="logo">
        <a href="/"><img src="/images/comet_cat.svg"></a>
    </span>

    <div class="button-wrapper">
        <!--MINIMUM VIABLE PRODUCT OUTLINE-->
        <!--Landing, sponsors, robot info-->
        <a href="/" class="button">Home</a>
        <!--Mission, subteam info, leads (member filtering by team, default to leads)-->
        <a href="/about.html" class="button">About</a>
        <!--Community - landing, events, updates, and media-->
        <a href="/community.html" class="button">Community</a>
        <a href="/contact.html" class="button">Contact</a>
    </div>
    <span id="bg"></span>
</div>

<script>
    window.addEventListener('scroll', function() {
        const nav_bar = document.querySelector("#nav_bar #bg");

        if (window.scrollY > 0) {
            nav_bar.style.backdropFilter = "blur(10px) brightness(20%)";
        } else {
            nav_bar.style.backdropFilter = null;
        }
    });
</script>
