<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Comet Robotics Team 1885</title>

    <!-- Link to the external CSS file -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Load jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>        
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">

    <link href="css/contact.css" rel="stylesheet">
</head>
<body>  
    <!-- Placeholder for the navigation bar -->
    <div id="nav-placeholder"></div>
    <div id="hero">
        <div class="gradient"></div>
        <div class="content">
            <div class="text-wrapper">
                <h1>CONTACT</h1>
                <a href="#form">
                    <button>GET INVOLVED</button>
                </a>
            </div>
        </div>
        <!-- <img src="images/hero_bg.avif"> -->
    </div>

    <div class="transition"></div>

    <!--Contact Form-->
    <section class="form-container">
        <p><b>Interested in volunteering, mentoring, or sponsoring? Fill out the form below to contact us!</b></p>
        <form id="form" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="fd276b79-9936-4fd0-9516-77a5454a0b70"><!--doesn't matter if hardcoded-->
            
            <!-- Form Inputs. Each input must have a name="" attribute -->
            <div class="first-forms">
                <h4>Full Name</h4>
                <h4>Email</h4>
                <input placeholder="John Doe" class="message-2" type="text" name="name" required>
                <input placeholder="example@example.com" class="message-2" type="email" name="email" required>
            </div>
            <div class="second-form">
                <h4>Message</h4>
                <textarea placeholder="I want to help Comet!" class="message" name="message" required></textarea>
            </div>

            <!-- Honeypot Spam Protection -->
            <input type="checkbox" name="botcheck" class="hidden" style="display: none;">
        
            <!-- Custom Confirmation / Success Page -->
            <input type="hidden" name="redirect" value="/">
        
            <button type="submit">SUBMIT FORM</button>
        
        </form>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/repeat.js"></script>
</body>
</html>
